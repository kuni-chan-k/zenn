title: "Reactで作る！スポーツ大会管理サービス"
summary: |
  React/Next.jsで実践的なWebアプリを作りながら学ぶハンズオン教材です。
  フットサルの大会・チーム・試合・順位表を管理するアプリを題材に、
  CRUD操作、フォーム処理、データの状態管理、計算ロジックの実装まで学べます。
  前半はlocalStorageで基礎を学び、後半でPrisma + PostgreSQL + JWT認証へ発展させます。
topics: ["React", "nextjs", "TypeScript", "Prisma"]
